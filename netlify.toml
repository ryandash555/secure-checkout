[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean hidden-code checkout links: /c/<code> serves the checkout page.
[[redirects]]
  from = "/c/*"
  to = "/index.html"
  status = 200

# Friendly paths for the private tools.
[[redirects]]
  from = "/builder"
  to = "/builder.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
